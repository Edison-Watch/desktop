appId: com.edisonwatch.desktop
productName: Edison Watch
protocols:
  - name: Edison Watch
    schemes: [edison-watch]
directories:
  buildResources: build
  output: dist
files:
  # Exclude build output dirs so a prior build's artifacts are never packed into
  # the asar. electron-builder auto-excludes `directories.output`, but a custom
  # `-c.directories.output=...` (e.g. the local auto-update test harness) leaves
  # the default `dist/` un-excluded - without this it recursively bundles old
  # builds and the app balloons to >1GB (which then breaks Squirrel auto-update).
  - '!dist'
  - '!dist-*'
  - '!**/.vscode/*'
  - '!**/.storybook/*'
  - '!src/*'
  - '!tests'
  - '!e2e'
  - '!scripts'
  - '!**/*.{map,tsbuildinfo}'
  - '!{vitest.config.ts,playwright.config.ts,playwright.visual.config.ts}'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: Edison Watch
  icon: resources/icon.ico
  # Bundled Python for the session hooks, staged by scripts/stage-python.ps1.
  # e.g. bin/python/x64 -> resources/python/python.exe
  extraResources:
    - from: bin/python/${arch}
      to: python
    # stdiod daemon (staged by scripts/build-stdiod-win.sh) -> resources/bin/.
    - from: bin/stdiod/${arch}/edison-stdiod.exe
      to: bin/edison-stdiod.exe
    # detector daemon (staged by scripts/build-detectord-win.sh) -> resources/bin/.
    - from: bin/detectord/${arch}/edison-detectord.exe
      to: bin/edison-detectord.exe
    # Node (npx) + uv (uvx) for the daemon's child MCP servers, staged by
    # scripts/stage-runtimes.ps1 -> resources/runtimes/{node,uv}.
    - from: bin/runtimes/${arch}
      to: runtimes
  target:
    - target: nsis
      arch:
        - x64
        - arm64
nsis:
  oneClick: false
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: true
  artifactName: EdisonWatch-${version}-${arch}-setup.${ext}
  shortcutName: Edison Watch
  uninstallDisplayName: Edison Watch
  createDesktopShortcut: always
  createStartMenuShortcut: true
  menuCategory: true
mac:
  icon: resources/icon.icns
  category: public.app-category.developer-tools
  # Bundle the edison-stdiod + edison-detectord daemons directly into
  # Contents/Resources/bin/. The .app targets arm64 (Apple Silicon) only; a
  # universal bundled binary still works (its arm64 slice is used), but arm64-only
  # staging is enough. @electron/osx-sign signs nested executables in
  # Contents/Resources automatically when hardenedRuntime: true, inheriting
  # entitlements from entitlementsInherit, so no afterPack hook is needed here.
  extraResources:
    - from: bin/edison-stdiod
      to: bin/edison-stdiod
    - from: bin/edison-detectord
      to: bin/edison-detectord
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  extendInfo:
    NSCameraUsageDescription: Application requests access to the device's camera.
    NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
    NSUserNotificationAlertStyle: alert
  notarize: false
dmg:
  artifactName: EdisonWatch-${version}-mac.${ext}
  title: Edison Watch ${version}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
linux:
  icon: resources/icon.png
  category: Development
  # Bundle the edison-stdiod + edison-detectord daemons (static musl binaries,
  # staged per-arch by scripts/build-stdiod-linux.sh and build-detectord-linux.sh)
  # into resources/bin/. Mirrors the win rule; getStdiodBinaryPath() /
  # getDetectordBinaryPath() resolve them via process.resourcesPath.
  # Unlike Windows we do NOT bundle Node/uv runtimes - Linux users get npx/uvx
  # from PATH (the systemd unit seeds a sensible PATH), matching the macOS app.
  extraResources:
    - from: bin/stdiod/${arch}/edison-stdiod
      to: bin/edison-stdiod
    - from: bin/detectord/${arch}/edison-detectord
      to: bin/edison-detectord
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
appImage:
  artifactName: EdisonWatch-${version}-${arch}.${ext}
# Use the modern STATIC AppImage runtime instead of the legacy one. The legacy
# runtime dynamically loads libfuse2 + libz.so from the host, which a base
# Ubuntu lacks (the recurring "libz.so / FUSE" launch failures). The static
# runtime (1.0.3, Runtime 20251108) bundles those, so the AppImage launches on a
# stock distro with no extra packages. Becomes the electron-builder v27 default;
# opt-in here. (Caveat: older AppImageLauncher installs can mishandle the static
# runtime - type2-runtime#121 - but stock systems are unaffected.)
toolsets:
  appimage: "1.0.3"
electronVersion: 40.8.0
npmRebuild: false
# Default artifact names: stable and space-free. Spaces (from productName
# "Edison Watch") become %20 and break electron-updater URLs and GitHub asset
# links. The dmg/nsis blocks above keep their own explicit names.
artifactName: EdisonWatch-${version}-${arch}.${ext}
# Publish to GitHub Releases (public repo -> no runtime token needed). The
# provider/owner/repo are baked into app-update.yml at build time, so the
# installed app resolves updates from GitHub with no feed URL set at runtime
# (see infra/updateManager.ts). Per-build channel + releaseType are set by the
# CI workflows via `-c`:
#   - stable -> channel: latest, releaseType: release  (.github/workflows/release.yml)
#   - demo   -> channel: beta,   releaseType: prerelease (release-demo.yml)
publish:
  provider: github
  owner: Edison-Watch
  repo: desktop
  channel: latest
