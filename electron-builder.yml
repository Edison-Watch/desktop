appId: com.edisonwatch.desktop
productName: Edison Watch
protocols:
  - name: Edison Watch
    schemes: [edison-watch]
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!**/.storybook/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: Edison Watch
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
        - arm64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: EdisonWatch-${version}-${arch}-setup.${ext}
  shortcutName: Edison Watch
  uninstallDisplayName: Edison Watch
  createDesktopShortcut: always
  createStartMenuShortcut: true
  menuCategory: true
mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - universal
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  extendInfo:
    NSCameraUsageDescription: Application requests access to the device's camera.
    NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
    NSUserNotificationAlertStyle: alert
  notarize: false
dmg:
  artifactName: EdisonWatch-${version}-mac.${ext}
  title: Edison Watch ${version}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
linux:
  icon: build/icon.png
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
electronVersion: 40.8.0
npmRebuild: false
publish:
  provider: github
  owner: Edison-Watch
  repo: edison-watch
  releaseType: release
