appId: com.edisonwatch.desktop
productName: Edison Watch
protocols:
  - name: Edison Watch
    schemes: [edison-watch]
directories:
  buildResources: build
  output: dist
files:
  # Exclude build output dirs so a prior build's artifacts are never packed into
  # the asar. electron-builder auto-excludes `directories.output`, but a custom
  # `-c.directories.output=...` (e.g. the local auto-update test harness) leaves
  # the default `dist/` un-excluded - without this it recursively bundles old
  # builds and the app balloons to >1GB (which then breaks Squirrel auto-update).
  - '!dist'
  - '!dist-*'
  - '!**/.vscode/*'
  - '!**/.storybook/*'
  - '!src/*'
  - '!tests'
  - '!e2e'
  - '!scripts'
  - '!**/*.{map,tsbuildinfo}'
  - '!{vitest.config.ts,playwright.config.ts,playwright.visual.config.ts}'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: Edison Watch
  icon: resources/icon.ico
  # Bundled Python for the session hooks, staged by scripts/stage-python.ps1.
  # e.g. bin/python/x64 -> resources/python/python.exe
  extraResources:
    - from: bin/python/${arch}
      to: python
    # stdiod daemon (staged by scripts/build-stdiod-win.sh) -> resources/bin/.
    - from: bin/stdiod/${arch}/edison-stdiod.exe
      to: bin/edison-stdiod.exe
    # Node (npx) + uv (uvx) for the daemon's child MCP servers, staged by
    # scripts/stage-runtimes.ps1 -> resources/runtimes/{node,uv}.
    - from: bin/runtimes/${arch}
      to: runtimes
  target:
    - target: nsis
      arch:
        - x64
        - arm64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: EdisonWatch-${version}-${arch}-setup.${ext}
  shortcutName: Edison Watch
  uninstallDisplayName: Edison Watch
  createDesktopShortcut: always
  createStartMenuShortcut: true
  menuCategory: true
mac:
  icon: resources/icon.icns
  category: public.app-category.developer-tools
  # Bundle the edison-stdiod daemon (universal Mach-O staged by
  # scripts/build-stdiod.sh) directly into Contents/Resources/bin/.
  # electron-builder's mac.target=universal requires this binary to also
  # be universal - see scripts/build-stdiod.sh for the lipo step.
  # @electron/osx-sign signs nested executables in Contents/Resources
  # automatically when hardenedRuntime: true, inheriting entitlements
  # from entitlementsInherit, so no afterPack hook is needed here.
  extraResources:
    - from: bin/edison-stdiod
      to: bin/edison-stdiod
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  extendInfo:
    NSCameraUsageDescription: Application requests access to the device's camera.
    NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
    NSUserNotificationAlertStyle: alert
  notarize: false
dmg:
  artifactName: EdisonWatch-${version}-mac.${ext}
  title: Edison Watch ${version}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
linux:
  icon: resources/icon.png
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
electronVersion: 40.8.0
npmRebuild: false
# Generic provider so electron-updater fetches latest-mac.yml + the zip from our
# R2 release bucket (co-located under client/latest/). This bakes a default
# app-update.yml pointing at the release channel; the demo CI build overrides
# the URL via `-c.publish.url=...`, and the running app additionally calls
# autoUpdater.setFeedURL() per environment (see infra/updateManager.ts).
publish:
  provider: generic
  url: https://releases.edison.watch/client/latest
  channel: latest
