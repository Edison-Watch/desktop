name: Build macOS

# Upstream TEST build - NOT a release.
# Pulls the latest published edison-stdiod universal binary from the stdiod repo,
# bundles it, and produces a universal .dmg/.zip uploaded as an Actions artifact.
#
# Signing depends on the trigger:
#   - pull_request: UNSIGNED. Code signing is the slow part of the build and
#     needs the CSC_* secrets, which GitHub withholds from fork/dependabot PRs -
#     so signing PR builds is both wasteful and impossible there. We skip it so
#     every PR (including dependabot) gets a green gate + a downloadable artifact.
#   - push to main (post-merge): SIGNED (Developer ID) but NOT notarized. Secrets
#     are available on same-repo push events, so we sign here to produce a
#     signed artifact. Notarization is skipped on purpose - it adds a multi-minute
#     Apple round-trip and isn't needed to verify the build/sign pipeline.
#
# Either way the artifact is un-notarized, so it's Gatekeeper-blocked on other
# machines (run `xattr -dr com.apple.quarantine` to launch) and won't auto-update
# - that's fine for testing. Real, notarized, published releases come from
# release.yml / release-demo.yml.

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: build-macos-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build (universal)
    runs-on: macos-latest # arm64; builds the universal target for both arches
    env:
      # Sign only on post-merge push to main; PR builds stay unsigned (see header).
      # On pull_request these resolve to empty / false so electron-builder skips
      # signing entirely instead of erroring on a missing certificate.
      CSC_LINK: ${{ github.event_name == 'push' && secrets.CSC_LINK || '' }}
      CSC_KEY_PASSWORD: ${{ github.event_name == 'push' && secrets.CSC_KEY_PASSWORD || '' }}
      # false => electron-builder produces an unsigned build without probing the
      # keychain for a Developer ID identity (none exists on PR runs).
      CSC_IDENTITY_AUTO_DISCOVERY: ${{ github.event_name == 'push' }}
      # gh CLI auth for cross-repo public release download.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Demo backend config. Vite's loadEnv() also reads matching keys from the
      # environment, so these flow into the bundle even without ../frontend-v2.
      # Set the DEMO_VITE_* repository variables (Settings > Variables).
      VITE_DEPLOY_ENV: ${{ vars.DEMO_VITE_DEPLOY_ENV }}
      VITE_API_BASE_URL: ${{ vars.DEMO_VITE_API_BASE_URL }}
      VITE_MCP_BASE_URL: ${{ vars.DEMO_VITE_MCP_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # The Electron runtime electron-builder downloads is pinned by electronVersion
      # in electron-builder.yml (independent of the resolved `electron` devDep), so
      # the cache below keys on that value.
      - name: Resolve Electron runtime version (cache key)
        id: electron
        run: echo "version=$(grep '^electronVersion:' electron-builder.yml | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      # Electron binaries (~100 MB/arch) + app-builder tools - the big download win.
      # Keyed on the Electron runtime version, NOT package-lock.json: these binaries
      # only change when Electron is upgraded, so an unrelated dependency bump (the
      # common dependabot case) no longer needlessly re-downloads ~200 MB. The npm
      # dependencies themselves are cached separately by setup-node's `cache: npm`.
      - name: Cache electron-builder downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-${{ steps.electron.outputs.version }}
          restore-keys: ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm ci

      - name: Pull latest edison-stdiod (universal) from stdiod releases
        run: |
          mkdir -p stdiod-dl bin
          gh release download --repo Edison-Watch/stdiod \
            --pattern 'edison-stdiod-macos-universal' \
            --pattern 'SHA256SUMS' \
            --dir stdiod-dl --clobber
          # Verify integrity against the published checksum before trusting it.
          ( cd stdiod-dl && grep 'edison-stdiod-macos-universal' SHA256SUMS | shasum -a 256 -c - )
          cp stdiod-dl/edison-stdiod-macos-universal bin/edison-stdiod
          chmod +x bin/edison-stdiod
          xattr -c bin/edison-stdiod || true
          lipo -info bin/edison-stdiod

      - name: Build renderer/main/preload bundles
        run: npm run build:demo

      - name: Package (universal, no notarization, no publish)
        run: npx electron-builder --mac --publish never -c.mac.notarize=false

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: edison-watch-macos
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error
          retention-days: 14
