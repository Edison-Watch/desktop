name: Build macOS (signed, not notarized)

# Fast upstream TEST build — NOT a release.
# Pulls the latest published edison-stdiod universal binary from the stdiod repo,
# bundles it, and produces a code-signed (Developer ID) but UN-notarized .dmg/.zip.
# Notarization is skipped on purpose: it adds a multi-minute Apple round-trip and
# isn't needed to verify the build/sign pipeline. The artifact will be
# Gatekeeper-blocked on other machines (run `xattr -dr com.apple.quarantine` to
# launch) and won't auto-update — that's fine for testing.

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

concurrency:
  group: build-macos-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & sign (universal)
    runs-on: macos-latest # arm64; builds the universal target for both arches
    env:
      # Code-signing only. Leave APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID
      # UNSET so electron-builder signs but does not notarize.
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      # Sign on PR builds too (internal repo). Fork PRs have no secrets, so CSC_LINK
      # is empty there and electron-builder falls back to an unsigned build.
      CSC_FOR_PULL_REQUEST: true
      # gh CLI auth for cross-repo public release download.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Demo backend config. Vite's loadEnv() also reads matching keys from the
      # environment, so these flow into the bundle even without ../frontend-v2.
      # Set the DEMO_VITE_* repository variables (Settings > Variables).
      VITE_DEPLOY_ENV: ${{ vars.DEMO_VITE_DEPLOY_ENV }}
      VITE_API_BASE_URL: ${{ vars.DEMO_VITE_API_BASE_URL }}
      VITE_MCP_BASE_URL: ${{ vars.DEMO_VITE_MCP_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Electron binaries (~100 MB/arch) + app-builder tools — the big download win.
      - name: Cache electron-builder downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm ci

      - name: Pull latest edison-stdiod (universal) from stdiod releases
        run: |
          mkdir -p stdiod-dl bin
          gh release download --repo Edison-Watch/stdiod \
            --pattern 'edison-stdiod-macos-universal' \
            --pattern 'SHA256SUMS' \
            --dir stdiod-dl --clobber
          # Verify integrity against the published checksum before trusting it.
          ( cd stdiod-dl && shasum -a 256 -c SHA256SUMS )
          cp stdiod-dl/edison-stdiod-macos-universal bin/edison-stdiod
          chmod +x bin/edison-stdiod
          xattr -c bin/edison-stdiod || true
          lipo -info bin/edison-stdiod

      - name: Build renderer/main/preload bundles
        run: npm run build:demo

      - name: Package & sign (universal, no notarization, no publish)
        run: npx electron-builder --mac --publish never -c.mac.notarize=false

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: edison-watch-macos
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error
          retention-days: 14
