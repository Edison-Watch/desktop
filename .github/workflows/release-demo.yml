name: Release macOS (demo prerelease)

# Manually-triggered DEMO prerelease to GitHub Releases (channel: beta).
# Builds a signed + NOTARIZED universal macOS app versioned as a prerelease of
# the NEXT stable: `${package.json version}-beta.${run_number}` (e.g.
# 0.5.4-beta.137 while stable is 0.5.3). Because that is always semver-greater
# than the released stable, demo installs only ever update within the demo
# channel and are never pulled down onto a stable release.
#
# This is the "manual pre-release" tier. The fast per-commit signed builds
# (build-macos.yml, Actions artifacts, NOT published) auto-update TO whatever
# this workflow publishes — that's why those builds are usable upstream.

on:
  workflow_dispatch:

concurrency:
  group: release-macos-demo
  cancel-in-progress: false

permissions:
  contents: write # create / publish the prerelease

jobs:
  release-demo:
    name: Build, sign, notarize & publish (demo prerelease)
    runs-on: macos-latest
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      # Notarized so demo testers don't hit the Gatekeeper prompt. Demo is
      # manual/infrequent, so the notarization round-trip is acceptable here
      # (unlike the fast per-commit build-macos.yml, which stays un-notarized).
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Demo backend config (DEMO_VITE_* repository variables).
      VITE_DEPLOY_ENV: ${{ vars.DEMO_VITE_DEPLOY_ENV }}
      VITE_API_BASE_URL: ${{ vars.DEMO_VITE_API_BASE_URL }}
      VITE_MCP_BASE_URL: ${{ vars.DEMO_VITE_MCP_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache electron-builder downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm ci

      - name: Pull latest edison-stdiod (universal) from stdiod releases
        run: |
          mkdir -p stdiod-dl bin
          gh release download --repo Edison-Watch/stdiod \
            --pattern 'edison-stdiod-macos-universal' \
            --pattern 'SHA256SUMS' \
            --dir stdiod-dl --clobber
          ( cd stdiod-dl && shasum -a 256 -c SHA256SUMS )
          cp stdiod-dl/edison-stdiod-macos-universal bin/edison-stdiod
          chmod +x bin/edison-stdiod
          xattr -c bin/edison-stdiod || true

      - name: Compute demo prerelease version
        id: ver
        run: |
          BASE=$(node -p "require('./package.json').version")
          DEMO="${BASE}-beta.${{ github.run_number }}"
          echo "version=$DEMO" >> "$GITHUB_OUTPUT"
          echo "Demo prerelease version: $DEMO (leads stable, beta channel)"

      - name: Build renderer/main/preload bundles (demo mode)
        run: npm run build:demo

      - name: Package, sign, notarize & publish prerelease to GitHub Releases
        # extraMetadata.version sets the app/asset/yaml version without editing
        # package.json. channel: beta writes beta.yml; releaseType: prerelease
        # marks the GitHub release as a prerelease (both required for the GitHub
        # provider to resolve the demo channel correctly).
        run: |
          npx electron-builder --mac --publish always \
            -c.extraMetadata.version="${{ steps.ver.outputs.version }}" \
            -c.mac.notarize=true \
            -c.publish.channel=beta \
            -c.publish.releaseType=prerelease
